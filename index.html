<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oscar Soto - Contratista</title>
    <!-- Iconos de Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #b03a2e; /* Fondo Rojo */
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 800px;
        }

        canvas {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0px 15px 25px rgba(0,0,0,0.5));
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 18px 40px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.3em;
            border-radius: 60px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            transition: 0.3s;
            width: 280px;
            margin: 0 auto;
        }

        .btn i { font-size: 1.5em; }
        .btn:hover { transform: scale(1.08); }

        .btn-whatsapp { background-color: #25d366; margin-top: 25px; }
        .btn-whatsapp:hover { background-color: #128c7e; }

        .btn-tiktok { background-color: #000000; margin-top: 15px; }
        .btn-tiktok:hover { background-color: #333333; }

        .btn-instagram { 
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            margin-top: 15px; 
        }
        .btn-instagram:hover { filter: brightness(1.1); }

        .aviso-contacto {
            color: #ffffff;
            font-weight: bold;
            font-size: 1.1em;
            margin-top: 10px;
            margin-bottom: 5px;
            text-transform: uppercase;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .footer-text {
            color: white;
            margin-top: 25px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <canvas id="canvasCasa" width="700" height="850"></canvas>

    <br>
    
    <a href="https://wa.me/5491130741817" class="btn btn-whatsapp" target="_blank">
        <i class="fab fa-whatsapp"></i> WHATSAPP
    </a>
    
    <div class="aviso-contacto">
        SOLO MENSAJES<br>
        EMERGENCIAS LLAMADAS
    </div>

    <a href="https://vt.tiktok.com/ZSusBGCUb/" class="btn btn-tiktok" target="_blank">
        <i class="fab fa-tiktok"></i> TIKTOK
    </a>

    <br>

    <a href="https://www.instagram.com/reel/DWJprWzE6vO/?igsh=MWFnMWxhcmg3dXg5eg==" class="btn btn-instagram" target="_blank">
        <i class="fab fa-instagram"></i> INSTAGRAM
    </a>
    
    <p class="footer-text">Presione un botón para ver trabajos o contactar</p>
</div>

<script>
    const canvas = document.getElementById('canvasCasa');
    const ctx = canvas.getContext('2d');

    function dibujarCasaGrande() {
        // --- 1. TECHO ---
        ctx.beginPath();
        ctx.moveTo(350, 20);   
        ctx.lineTo(680, 250);  
        ctx.lineTo(20, 250);   
        ctx.closePath();
        ctx.fillStyle = '#222222'; 
        ctx.fill();

        // --- 2. PAREDES ---
        ctx.fillStyle = '#FFFFFF';
        ctx.strokeStyle = '#222222';
        ctx.lineWidth = 10;
        ctx.fillRect(60, 250, 580, 550); 
        ctx.strokeRect(60, 250, 580, 550);

        // --- 3. TEXTO INTERNO (Aumentado) ---
        ctx.textAlign = 'center';

        // Nombre Principal
        ctx.fillStyle = '#b03a2e'; 
        ctx.font = 'bold 65px Arial'; // De 50px a 65px
        ctx.fillText('OSCAR SOTO', 350, 340);

        // Profesión
        ctx.fillStyle = '#333';
        ctx.font = 'bold 48px Arial'; // De 38px a 48px
        ctx.fillText('CONTRATISTA', 350, 400);

        // Slogan
        ctx.fillStyle = '#666';
        ctx.font = 'italic 32px Arial'; // De 28px a 32px
        ctx.fillText('30 Años de Excelencia', 350, 450);

        // Línea divisoria
        ctx.beginPath();
        ctx.moveTo(120, 475);
        ctx.lineTo(580, 475);
        ctx.strokeStyle = '#cccccc';
        ctx.lineWidth = 3;
        ctx.stroke();

        // Título Trabajos
        ctx.fillStyle = '#000';
        ctx.font = 'bold 42px Arial'; // De 32px a 42px
        ctx.fillText('TRABAJOS:', 350, 530);

        // Lista de Servicios
        const servicios = [
            '🔨 Albañilería',
            '🎨 Pintura',
            '⚡ Electricidad',
            '🔥 Gasista',
            '🏠 Techista'
        ];

        ctx.font = 'bold 36px Arial'; // De 30px a 36px
        let yPos = 585;
        servicios.forEach(s => {
            ctx.fillText(s, 350, yPos);
            yPos += 50; // Espaciado entre líneas aumentado para mayor claridad
        });
    }

    window.onload = dibujarCasaGrande;
</script>

</body>
</html>
